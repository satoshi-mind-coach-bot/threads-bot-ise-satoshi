name: Threads Auto Post - ise_satoshi

on:
  schedule:
    - cron: '0 22 * * *'   # JST 7:00
    - cron: '30 1 * * *'   # JST 10:30
    - cron: '0 5 * * *'    # JST 14:00
    - cron: '30 8 * * *'   # JST 17:30
  workflow_dispatch:

concurrency:
  group: threads-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post loop (up to 4 times, 42min apart)
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          git config user.email "bot@threads-bot"
          git config user.name "ThreadsBot"

          for i in 1 2 3 4; do
            echo "=== attempt $i/4 ==="

            python agents/writer.py

            python agents/poster.py

            git pull --rebase origin main || true
            git add data/
            git diff --staged --quiet || git commit -m "Update queue and history"
            git push origin main || true

            if [ $i -lt 4 ]; then
              echo "Sleeping 42 min..."
              sleep 2520
            fi
          done

      - name: Re-enable schedule
        if: always()
        run: gh workflow enable post.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
